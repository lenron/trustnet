<!DOCTYPE HTML>
<html>
<meta content="text/plain;charset=utf-8" http-equiv="Content-Type" />
<meta content="utf-8" http-equiv="encoding" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<style>

	* {
		font-family: "Orbitron", serif;
		font-optical-sizing: auto;
		font-weight: 600;
		font-style: normal;
		color: #54c597;
	}

	html, body {
		background-color: #272727;
		display: flex;
		flex-direction: column;
		min-height: 100vh;
		margin: 0;
		padding: 0;
	}

	.main_site {
		height: 100%;
	}

	.header {
		display: flex;
		flex-direction: row;
		justify-content: space-between;
		align-items: center;
		color: #54c597;
		padding: 4px;
		padding-right: 10px;
		padding-left: 10px;
	}

	.header_content {
		display: flex;
	}

	.header_title:hover {
		cursor: pointer;
	}

	.header_label {
		padding: 8px;
	}

	.center_html {
		width: 100%;
		min-height: 100%;
		background-color: #272727;
		flex: 1 auto;
		display: flex;
		justify-content: center;
	}

	/* Single (pages) shown to user as they (flow) through site. */
	.flow_pages {
		width: 700px;
		margin: 10px;
		align-self: center;
		display: flex;
		flex-direction: column;
		justify-content: center; 
		color: #54c597;
	}

	/* default button styling. HTML style="" will override. */
	button {
		/*width: 400px;*/
		height: 65px;
		background-color: #434343;
		border: 2px solid;
		padding: 2px;
		margin: 8px;
		padding-right: 10px;
		padding-left: 10px;
		color: #54c597;
		border-color: #54c597;
		font-size: 17px;
		border-radius: 15px;
	}

	/*input[type="password"] {*/
	input {
		height: 80px;
		width: 95%;
		background-color: #272727;
		border: 2px solid;
		padding: 8px;
		margin: 8px;
		border-color: #54c597;
		color: #54c597;
		font-size: 25px;
		border-radius: 20px;
	}

	a {
		font-family: Arial, Helvetica, sans-serif;
		font-size: 16px;
		color: blue;
	}

	p {
		font-family: Arial, Helvetica, sans-serif;
		font-size: 16px;
		color: black;
	}

	/* Change the textareas inside divs with 'flow_pages' class to the following: */
	.flow_pages textarea {
		width: 95%;
		height: 150px;
		background-color: #272727;
		border: 2px solid;
		padding: 12px;
		margin: 8px;
		border-color: #54c597;
		color: #54c597;
		font-size: 25px;
		border-radius: 30px;
	}

	/* 'Are you sure?' overlay */
	.deletecheck {
		justify-content:center;
		align-items:center;
		z-index:10;
		position:absolute;
		width:100%;
		height:215%;
		background-color:gray;
		padding:8px;
		margin-left:0;
		margin-top:-40%;
		flex-direction: column;
		border:2px solid;
		border-color:red; 
		border-radius:30px;
	}

	.devsite_inputs {
		font-family: Arial, Helvetica, sans-serif;
		font-size: 16px;
		color: black;
		background-color: grey;
	}

	.tooltip {
		font-family: Arial, Helvetica, sans-serif;
		font-size: 16px;
		color: black;
	}

	/* Add this class to a span or label (and other types?) to make it a cool looking pink */
	.coolpink {
		color:#ff00ff;
		text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
	}

	/* Change cursor image to pointer with plus (identified by 'copy' indicator) */
	/* Apply hover to div child elements recursively which apply encrypt_hover class.*/
	.encrypt_hover:hover * {
		cursor: copy;
	}
	/* Apply hover to specific div id*/
	#encrypt_click_access:hover {
		cursor: copy;
	}
	/* Apply hover to specific div */
	#encrypt_click_store:hover {
		cursor: copy;
	}

	/* Apply hover to div child elements recursively which apply encrypt_hover class.*/
	.decrypt_hover:hover * {
		cursor: copy;
	}
	/* Apply hover to specific div */
	#decrypt_click_access:hover {
		cursor: copy;
	}
	/* Apply hover to specific div */
	#decrypt_click_store:hover {
		cursor: copy;
	}

	.openssl_encrypt_flowchart {
		background-image: url('./svg_images/openssl_encrypt_flowchart.drawio.svg');
	}

	.openssl_decrypt_flowchart {
		background-image: url('./svg_images/openssl_decrypt_flowchart.drawio.svg');
	}

	/* Makes the background color blend from orange to #AEE850 */
	.glossy_button {
		background: linear-gradient(orange, #aee850);
		border: 1px solid #1d6511;
		color: black;
		font-size: 12px;
		height: 30px;
		cursor: pointer;
	}

	/* Makes the text blend from orange to #AEE850 */
	/* background-clip: text creates a 'cut-out' of the background where the text exists, creating text with a linear gradient.*/
	.glossy_icon {
		background-image: linear-gradient(orange, #aee850);
		color: transparent;
		background-clip: text;
	}

	/* Set minimum page Width to */
	@media screen and (max-width: 340px){ html,body {min-width: 340px} }

	/* Set minimum page Height to 400 */
	@media screen and (max-height: 400px){ html,body {min-height: 400px} }	

	/* Responsive Design: When the viewport is fewer than 700px wide, activate the following CSS. */
	@media screen and (max-width:700px) {

		input[type="password"] {
			width: 90%;
		}

		textarea {
			width: 90%;
		}

		.header {
			flex-direction: column;
		}

		.home button {
			width: 200px;
			/*border-color: black;*/
		}

		.home_buttons {
			/*flex-direction: column;*/
		}

		.choose button {
			font-size: 14px;
		}

		.upload input {
			font-size: 16px;
		}

		.deletecheck {
			margin-top: -50%;
			height: 220%;
		}
		
	}
	@media screen and (max-width:500px) {
/*
		input {
			width: 400px;
		}

		textarea {
			width: 400px;
		}
*/
		.home button {
			width: 150px;
			font-size: 14px;
			/*border-color: black;*/
		}

		.deletecheck {
			width: 95%;
			margin-top: -75%;
			height:250%;
		}
	}

</style>
<body>
	<!--------------------------HEADER----------------------------!>
	<div class="header" id="header">
		<div class="header_content" id="header_left">
			<div class="header_title">
				<a href="https://obf.mkrsvr.org" id="titletext" style="font-size:30px; text-decoration:underline;" >PGO-SECRETWORD</a>
			</div>
		</div>
		<div class="header_content" id="header_right">
			<div class="header_label" style="">
				<a href="https://obf.mkrsvr.org/faq">FAQ</a>
			</div>
			<div class="header_label" style="">
				<a href="https://obf.mkrsvr.org/contact">CONTACT</a>
			</div>
		</div>
	</div>

	<!--------------------------Div Housing for Flow Pages----------------------------!>
	<div class="center_html" id="center_html" style="">

		<!--------------------------CONTACT PAGE - CAPTCHA----------------------------!>
		<div class="flow_pages " id="contact_page_captcha" style="display:flex; ">
			<div style="display:flex; flex-direction:row; justify-content:space-between;">
				<label>CONTACT PAGE</label>
			</div>
			<h2>THE COLOR OF THE SKY IS?</h2>
			<input autocomplete="off" type="" value="" id="captcha_input" style="" >
			<div class="button_pair" id="" style="display:flex;">
				<button class="activatable_by_enter" id='' style="flex-grow:1;" onclick="checkCaptcha()">CONTINUE</button>
			</div>
		</div>

		<!--------------------------CONTACT PAGE----------------------------!>
		<div class="flow_pages " id="contact_page" style="display:none">
			<div style="display:flex; flex-direction:row; justify-content:space-between;">
				<label>CONTACT PAGE</label>
			</div>
			<h2>Please leave us a message:</h2>
			<textarea value="" id="contact_textarea" style="color:gray" rows="8" cols="50"></textarea>
			<div class="button_pair" id="" style="display:flex;">
				<button class="activatable_by_enter" id='' style="flex-grow:1;" onclick="submitContactMessage()">CONTINUE</button>
			</div>
		</div>

		<!--------------------------CONTACT THANKS----------------------------!>
		<div class="flow_pages " id="contact_thanks" style="display:none">
			<div style="display:flex; flex-direction:row; justify-content:space-between;">
				<label>CONTACT PAGE</label>
			</div>
			<h2>THANK YOU FOR YOUR MESSAGE!</h2>
		</div>
	</div><!----------------CENTER HTML---------------->

<script>


	// Perform simple captcha check.
	function checkCaptcha(){
		const enteredCaptchaValue = document.getElementById('captcha_input').value;
		if (enteredCaptchaValue === 'blue') {
			showPage('contact_page');
		}
	}

	// Submit user message to site owners.
	function submitContactMessage(){
		const contactMessage = document.getElementById('contact_textarea').value;
		serverSendContactMessage(contactMessage);
		showPage('contact_thanks');
	}

	// Detect when user presses 'Enter' on their keyboard.
	// Then on current page click button if it contains class 'activatable_by_enter'
	window.addEventListener("keydown", function(event){
		if (event.key === "Enter"){
			// If focused element is an input, enter clicks the button with activatable_by_enter.
			if (document.activeElement.tagName == "INPUT"){
				const buttonObj = document.getElementById(currentPage).querySelector('.activatable_by_enter');
				if (buttonObj !== null){
					buttonObj.click();
				}else{
					console.log("We hit a null page: " + currentPage);
				}
				// https://stackoverflow.com/questions/50403457/focus-method-triggers-button-click-event
				// Prevent strange behavior where "the default action is performed on the newly focused element".
				event.preventDefault();
				// Without it the Branch screen was getting 'pre-clicked' when enter was pressed on previous Page.
			}else{
				// Focused element isn't an Input, do nothng I guess?
			}
		}
	});// Listener for Enter


	// Keep track of the page we're on. Start on home page.
	let currentPage = 'contact_page_captcha';
	// Hide all other pages, then show target page. 
	// Input: Target is the element ID of a page for flowing the user through site.
	function showPage(target){
		// Set global variable. Currently used for only Enter keydown catch.
		currentPage = target;
		// Hide all password warnings.
		let pass_warn_elements = document.getElementsByClassName('pass_length_warn');
		for (let i = 0; i < pass_warn_elements.length; i++) {
			pass_warn_elements[i].style.display = "none";
		}

		let flow_page_divs;
		// Fill flow_page_divs array with set of objects (hopefully divs in this case) that contain the flow_pages class.
		flow_page_divs = document.getElementsByClassName('flow_pages');
		// hide all flow_page_divs
		for (let i = 0; i < flow_page_divs.length; i++) {
			flow_page_divs[i].style.display = "none";
		}
		// show target 
		document.getElementById(target).style.display = "flex";
		// focus input or textbox
		let inputs_array = document.getElementById(target).getElementsByTagName('input');
		let textareas_array = document.getElementById(target).getElementsByTagName('textarea');
		// There is only 1 input or 1 textarea per div in our setup.
		// If we found more than zero inputs in the array, focus the first and only one.
		if (inputs_array.length > 0){
			inputs_array[0].focus();
		}else if (textareas_array.length > 0){
		// Otherwise, we should find 1 textarea to focus if we need to focus anything.
			 textareas_array[0].focus();
		}else{
			// If there's no input, focus the button with 'activatable_by_enter' class.
			const buttonObj = document.getElementById(currentPage).querySelector('.activatable_by_enter');
			if (buttonObj !== null){
				document.getElementById(buttonObj.id).focus();
			}
		}
	}// showPage()

	// Email owners with user contact message.
	async function serverSendContactMessage(contactMessage){
		let SERVER_URL = getServerOrigin();
		SERVER_URL += 'exesendcontactmessage';

		try { // Catch a rejected promise so we can operate on it.
			// Execute HTTP request to SERVER_URL with the following options.
			const fetchResponseObject = await fetch(SERVER_URL, {
				method: 'POST',
				headers: {
					'Content-Type': 'text/plain',
				},
				body: JSON.stringify({ // Convert javascript JSON object into string for transport.
					message: contactMessage,// Don't need to send any information to server?
				}),
			});

			if (!fetchResponseObject.ok) { // Indicates HTTP error.
				// Response Status is the numerical code like 404, 500, etc.
				throw new Error(`Response status: ${fetchResponseObject.status}`);
			}
			// Now that we've cleared the error check, we can proceed with processing the response.
			// Make a copy of the json extraction.
			const responseObj = await fetchResponseObject.json();
			//console.log(responseObj);
			if (responseObj.response){
				console.log("Contact message response: " + responseObj.response);
			}else{
				console.log("Contact message return error.");
			}
		//Can be triggered by: a DNS failure, connection timeout, or the user being offline.
		} catch (error) { // Catch rejected promise.
			console.error(error.message);
		}
	}// serverSendContactMessage()

	// We need to set the origin differently depending if we're a standalone file or not.
	// This function checks our origin and sets it to the server url to enable server functionality for a standalone.html.
	// Returns the SERVER_URL to be used for server communication functions.
	function getServerOrigin(){
		// Check origin.
		const url_origin = window.location.origin;
		let server_origin = '';
		// If we're standalone, set address to chat.dance instead of a relative path.
		const regex = new RegExp(/^file/);
		if (regex.test(url_origin)){
			//console.log("We're a standalone file!");
			//server_origin = 'https://chat.dance/obf/';
			server_origin = 'https://obf.mkrsvr.org/';
		}else{
			//console.log("We're NOT a standalone file!");
			//server_origin = '/obf/';
			//server_origin = '/';
			server_origin = '';
		}
		return server_origin;
	}// getServerOrigin()


</script>


</body>
</html>
